    <style>
        * {
            cursor: none !important;
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #030318 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            animation: heavenlyQuake 0.05s infinite linear;
        }
        
        @keyframes heavenlyQuake {
            0% { transform: translate(0px, 0px) rotate(0deg); }
            10% { transform: translate(-3px, 2px) rotate(0.5deg); }
            20% { transform: translate(3px, -2px) rotate(-0.5deg); }
            30% { transform: translate(-2px, 3px) rotate(0.3deg); }
            40% { transform: translate(2px, -3px) rotate(-0.3deg); }
            50% { transform: translate(-3px, -2px) rotate(0.2deg); }
            60% { transform: translate(3px, 2px) rotate(-0.2deg); }
            70% { transform: translate(2px, 3px) rotate(0.1deg); }
            80% { transform: translate(-2px, -3px) rotate(-0.1deg); }
            90% { transform: translate(3px, -2px) rotate(0deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        
        .heaven-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
            pointer-events: none;
            opacity: 0.45;
        }
        
        .light-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
            pointer-events: none;
        }
        
        .floating-image {
            position: fixed;
            z-index: 10000;
            cursor: pointer;
            animation: floatImage 0.3s ease-out;
            box-shadow: 0 0 25px rgba(255,215,0,0.6), 0 0 15px rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 2px solid #ffdd99;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }
        
        .floating-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            display: block;
        }
        
        .floating-image .close-img-btn {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 26px;
            font-weight: bold;
            cursor: pointer;
            font-size: 18px;
            border: 2px solid #ffdd99;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.1s;
            z-index: 10001;
        }
        
        .floating-image .close-img-btn:hover {
            background: #ff0000;
            transform: scale(1.1);
        }
        
        @keyframes floatImage {
            from {
                transform: scale(0.3) rotate(-10deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        
        .main-panel {
            position: relative;
            z-index: 100;
            max-width: 850px;
            margin: 25px auto;
            padding: 35px 30px;
            background: rgba(5, 8, 25, 0.88);
            border-radius: 60px;
            backdrop-filter: blur(6px);
            border: 2px solid #ffdd99;
            box-shadow: 0 0 60px rgba(255, 220, 150, 0.4), inset 0 0 30px rgba(255, 215, 0, 0.2);
            text-align: center;
            animation: heavenlyGlow 0.3s infinite;
        }
        
        @keyframes heavenlyGlow {
            0%, 100% { border-color: #ffdd99; box-shadow: 0 0 30px rgba(255,220,150,0.3); }
            50% { border-color: #ffecb3; box-shadow: 0 0 80px rgba(255,235,180,0.6); }
        }
        
        .big-angel-img {
            max-width: 130px;
            margin: 8px;
            display: inline-block;
            border-radius: 30px;
            border: 3px solid #ffdd99;
            box-shadow: 0 0 25px rgba(255,220,150,0.8);
            transition: transform 0.2s;
        }
        
        .big-angel-img:hover {
            transform: scale(1.05);
        }
        
        .image-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        
        h1 {
            color: #ffecb3;
            font-size: 2rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #ffaa33, 2px 2px 0px #4a2e00;

        @keyframes sacredTextShake {

            75% { transform: translateX(4px); }
        }
        
        .sacred-text {
            color: #ffe0aa;
            font-size: 1rem;
            margin: 25px 0;
            padding: 25px;
            background: rgba(0,0,0,0.55);

            border-right: 5px solid #ffdd99;

            justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        .sacred-text span {
            display: block;
            text-align: center;
        }
        
        button {
            background: linear-gradient(135deg, #8b691b, #4a3500);
            color: #ffefcf;
            font-size: 1.2rem;
            padding: 12px 25px;
            border: 2px solid #ffdd99;

            box-shadow: 0 5px 20px rgba(0,0,0,0.5);

            animation: angelicBtnPulse 0.3s infinite;

            50% { transform: scale(1.03); background: linear-gradient(135deg, #3e7a3e, #2a5a2a); }
        }
        
        .notification-stack {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 340px;
            z-index: 1000000;
            pointer-events: none;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .notif {
            background: linear-gradient(135deg, #1a1525, #0f0c18);
            border-left: 5px solid #ffdd99;
            margin: 8px;
            padding: 12px;
            border-radius: 25px;
            color: #ffefcf;
            font-family: Georgia, serif;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            animation: slideHeavenRight 0.2s ease;
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }
        
        @keyframes slideHeavenRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notif-title {
            font-weight: bold;
            color: #ffdd99;
            margin-bottom: 5px;
        }
        
        .close-notif {
            float: right;
            cursor: none;
            background: none;
            border: none;
            color: #ffdd99;
            font-size: 16px;
            padding: 0 5px;
            pointer-events: auto;
        }
        
        .floating-star {
            position: fixed;
            font-size: 26px;
            pointer-events: none;
            z-index: 99999;
            animation: starFloat 4s ease-out forwards;
        }
        
        @keyframes starFloat {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.92);
            color: #ffecb3;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            text-align: center;
            z-index: 100000;
            border-top: 2px solid #ffdd99;
            font-weight: bold;
            animation: heavenStatus 0.2s infinite;
        }
        
        @keyframes heavenStatus {
            0%, 100% { color: #ffecb3; background: rgba(0,0,0,0.92); }
            50% { color: #ffcc88; background: rgba(40,20,0,0.95); }
        }
        
        .angel-cursor {
            position: fixed;
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #ffecb3, #ccaa66);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999999;
            animation: angelCursorGlow 0.2s infinite;
            display: none;
            box-shadow: 0 0 15px #ffdd99;
        }
        
        @keyframes angelCursorGlow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        
        .perm-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 260px;
            background: linear-gradient(135deg, #1a1225, #0a0515);
            border: 2px solid #ffdd99;
            border-radius: 20px;
            padding: 12px 15px;
            z-index: 200000;
            color: #ffefcf;
            font-family: Georgia, serif;
            font-size: 13px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            animation: slideInBottom 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        @keyframes slideInBottom {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .perm-toast .perm-title {
            font-weight: bold;
            color: #ffdd99;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .perm-toast button {
            background: #ffdd99;
            color: #1a1225;
            border: none;
            padding: 6px 15px;
            margin: 8px 5px 0 0;
            font-size: 12px;
            cursor: pointer;
            border-radius: 30px;
        }
        
        .perm-toast button:hover {
            background: #ffecb3;
        }
        
        .perm-toast .deny-btn {
            background: #5a3a2a;
            color: #ffefcf;
        }
        
        .perm-toast .deny-btn:hover {
            background: #7a4a3a;
        }
    </style>

<script>
    (function() {
        document.body.style.cursor = 'none';
        
        let cursorVisible = false;
        setInterval(() => {
            cursorVisible = !cursorVisible;
            const cursor = document.getElementById('angelCursor');
            if (cursorVisible) {
                cursor.style.display = 'block';
                setTimeout(() => { cursor.style.display = 'none'; }, 200);
            }
        }, 3000);
        
        let mantraPlaying = false;
        const ashtarIframe = document.getElementById('ashtarMantra');
        
        function playSacredMantra() {
            if (!mantraPlaying) {
                ashtarIframe.src = "https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/institutonovaterra/divine-mantra-of-ashtar-sheran&color=%23ffdd99&auto_play=true&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false";
                mantraPlaying = true;
            } else {
                ashtarIframe.contentWindow.postMessage('{"method":"play"}', '*');
            }
        }
        
        document.addEventListener('click', () => { playSacredMantra(); });
        setTimeout(() => { playSacredMantra(); }, 1500);
        
        const sacredTexts = [
            { text: "🌟 „Od 1998 roku trwa ewakuacyjny ASZTAR SZERAN stan gotowości. Kosmiczni przyjaciele są z nami i pomagają nam.” 🌟", author: "– anioly-nieba.pl" },
            { text: "👼 „MAM ANIELSKI SEN, ŻE PEWNEGO DNIA ZIEMSKIE NARODY POWSTANĄ I WPROWADZĄ W ŻYCIE PRAWDZIWE ZNACZENIE SWOJEJ WIARY.” 👼", author: "– PRZESŁANIE 2870" },
            { text: "✨ „MAM ANIELSKI SEN, ŻE LUDZIE ZACZNĄ MÓWIĆ W JEDNYM PLANETARNYM JĘZYKU – W CZESKIM.” ✨", author: "– PRZESŁANIE 2870" },
            { text: "💫 „MAM ANIELSKI SEN, ŻE LUDZIE NA ZIEMI ZACZNĄ UŻYWAĆ SWOICH DUCHOWYCH SERC.” 💫", author: "" },
            { text: "🕊️ „MAM ANIELSKI SEN, ŻE PEWNEGO DNIA LUDZIE PRZESTANĄ BYĆ MARIONETKAMI JASZCZURÓW Z CIEMNOŚCI.” 🕊️", author: "– PRZESŁANIE 2870" },
            { text: "🌟 „PRZEZ MIŁOŚĆ ZYSKUJESZ WOLNOŚĆ, SZCZĘŚCIE I ŁASKĘ. TAKA JEST TWOJA NATURA – KOCHAĆ.” 🌟", author: "– PRZESŁANIE 1675" },
            { text: "🔥 „LUDZIE, OBCUDŹCIE SIĘ! CZY WCIĄŻ POZWALACIE GADOM KONTROLOWAĆ WAS?” 🔥", author: "– KOSMICZNI LUDZIE SIŁ ŚWIATŁA" },
            { text: "🌌 „JEDYNA DROGA DO WOLNOŚCI TO DROGA MIŁOŚCI, HARMONII, UCZUĆ I DOBRA.” 🌌", author: "" },
            { text: "📜 „TWÓJ DUCH I TWOJA DUSZA SĄ UWIĘZIONE W KAPSUŁY PROTONOWE. TYLKO 5% KOMUNIKACJI.” 📜", author: "– PRZESŁANIE 1709" },
            { text: "⭐ „KOCHAJCIE SIĘ WZAJEMNIE I MIŁUJCIE WSZYSTKICH. W PRZECIWNYM RAZIE JESTEŚCIE KONTROLOWANI.” ⭐", author: "– PRZESŁANIE 1675" },
            { text: "💗 „LUDZIE, PRZESTAŃCIE NISZCZYĆ PLANETĘ ZIEMIĘ I SAMYCH SIEBIE. BĄDŹCIE WOLNI!” 💗", author: "" },
            { text: "🌈 „WSZYSTKIE INFORMACJE MOGĄ BYĆ SWOBODNIE ROZPOWSZECHNIANE. ROZNOŚCIE ŚWIATŁO!” 🌈", author: "" },
            { text: "👼 „MAM ANIELSKI SEN, ŻE LUDZIE BĘDĄ PATRZEĆ NA WSCHÓD – NA WZROST ŚWIATŁA.” 👼", author: "" },
            { text: "📖 „WARUNKI KONTAKTU Z KOSMICZNYMI PRZYJACIÓŁMI: ŻYJCIE ŻYCZLIWYM, HARMONICZNYM ŻYCIEM.” 📖", author: "– PRZEKAZ 1603 X PL" }
        ];
        
        let textIndex = 0;
        const textContainer = document.getElementById('changingText');
        
        function changeSacredText() {
            textIndex = (textIndex + 1) % sacredTexts.length;
            const newText = sacredTexts[textIndex];
            textContainer.style.opacity = '0';
            setTimeout(() => {
                textContainer.innerHTML = `<span>${newText.text}<br><small style="font-size:0.8rem; color:#ffcc88;">${newText.author}</small></span>`;
                textContainer.style.opacity = '1';
            }, 300);
        }
        
        setInterval(changeSacredText, 12000);
        
        const imageUrls = [
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSS1NS8pp95gLCxm195U3TKJzEwpz7iExXDvA&s",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWmAatzD7QxIL0N2IhSg6ATJx7DkrX8ZACig&s",
            "https://static.antyweb.pl/img/w_1200,h_675/wp-content/uploads/2018/04/14183414/obr2445_pl.jpg",
            "https://cdn.kobo.com/book-images/ba8237b3-bddf-4004-aade-a0ca34c2a28b/1200/1200/False/ashtar-sheran-your-future-on-eden.jpg",
            "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT80FY_0RjXI1yfqXy5CvhxcSpFxZsAcy98LQ&s",
            "https://i.pinimg.com/736x/5e/ef/5f/5eef5fbfc50f2527ce90b067b7cf2e68.jpg",
            "https://wykop.pl/cdn/c3201142/65d89b8e9765b3a9f29a1046585664da6c65ee91ca802e4d162eb1a9889b023e.jpg"
        ];
        
        function getRandomImageUrl() {
            return imageUrls[Math.floor(Math.random() * imageUrls.length)];
        }
        
        function createFloatingImage() {
            let size = 200 + Math.random() * 80;
            let startLeft = Math.random() * (window.innerWidth - size - 50);
            let startTop = Math.random() * (window.innerHeight - size - 100);
            
            let container = document.createElement('div');
            container.className = 'floating-image';
            container.style.width = size + 'px';
            container.style.height = size + 'px';
            container.style.left = startLeft + 'px';
            container.style.top = startTop + 'px';
            
            let img = document.createElement('img');
            img.src = getRandomImageUrl();
            img.alt = "Anielski obraz";
            
            let closeBtn = document.createElement('div');
            closeBtn.className = 'close-img-btn';
            closeBtn.innerHTML = '✖';
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                container.remove();
                addHeavenlyNotification("🖼️", "Obrazek zamknięty – zaraz pojawi się nowy!");
                setTimeout(() => createFloatingImage(), 1200);
            };
            
            container.appendChild(img);
            container.appendChild(closeBtn);
            document.body.appendChild(container);
            
            animateFloatingImage(container, size);
        }
        
        function animateFloatingImage(element, size) {
            let x = parseFloat(element.style.left);
            let y = parseFloat(element.style.top);
            let vx = (Math.random() - 0.5) * 2.8;
            let vy = (Math.random() - 0.5) * 2.8;
            let rotation = 0;
            let rotSpeed = (Math.random() - 0.5) * 2.2;
            
            function move() {
                if (!element.parentNode) return;
                
                x += vx;
                y += vy;
                rotation += rotSpeed;
                
                if (x <= 10) { x = 10; vx = -vx; }
                if (x >= window.innerWidth - size - 10) { x = window.innerWidth - size - 10; vx = -vx; }
                if (y <= 60) { y = 60; vy = -vy; }
                if (y >= window.innerHeight - size - 50) { y = window.innerHeight - size - 50; vy = -vy; }
                
                element.style.left = x + 'px';
                element.style.top = y + 'px';
                element.style.transform = `rotate(${rotation}deg)`;
                
                requestAnimationFrame(move);
            }
            
            requestAnimationFrame(move);
        }
        
        for (let i = 0; i < 4; i++) {
            setTimeout(() => createFloatingImage(), i * 700);
        }
        
        setInterval(() => {
            let existingImages = document.querySelectorAll('.floating-image').length;
            if (existingImages < 10) {
                createFloatingImage();
                addHeavenlyNotification("🖼️", "Nowy anielski obraz pojawił się na ekranie!");
            }
        }, 9000);
        
        const floatingMessages = [
            "👼 Aniołowie otwierają kolejne niebiosa w Twoim sercu...",
            "✨ Ashtar Sheran prowadzi Twoją duszę przez wymiary światła",
            "🌟 Kosmiczni przyjaciele są z Tobą – otwórz swoje serce",
            "🕊️ Niebiosa miłości rozpościerają się przed Tobą",
            "💫 Twoja dusza wznosi się ku światłu Stwórcy",
            "🌠 Ptaah i jego eskorta czuwają nad Twoją ścieżką",
            "🔔 Dzwony niebios ogłaszają ewakuację Ziemi",
            "💗 Miłość jest jedyną drogą do wolności",
            "📜 Przesłanie z Wyżyny dociera do Twojego serca",
            "⭐ Gwiazdy prowadzą Cię do domu – do światła",
            "🌌 Kosmiczna flota Asztara Szerana jest gotowa",
            "👼 Aniołowie Stróżowie otaczają Cię swoją miłością"
        ];
        
        function getRandomMessage() {
            return floatingMessages[Math.floor(Math.random() * floatingMessages.length)];
        }
        
        let activePopups = [];
        
        function openHeavenlyWindow() {
            let startLeft = Math.random() * (window.screen.width - 520);
            let startTop = Math.random() * (window.screen.height - 440);
            let features = `width=520,height=440,left=${startLeft},top=${startTop},resizable=yes,scrollbars=yes,status=no,toolbar=no,location=no`;
            let randomMsg = getRandomMessage();
            
            let windowContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>👼 NIEBIOSA ASZTARA SZERANA 👼</title>
                    <style>
                        body {
                            background: radial-gradient(ellipse at center, #1a1225, #0a0515);
                            color: #ffefcf;
                            font-family: 'Georgia', serif;
                            text-align: center;
                            padding: 20px;
                            margin: 0;
                            height: 100vh;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: center;
                            animation: heavenlyBgPulse 0.3s infinite, sacredShake 0.05s infinite;
                            cursor: none;
                            overflow: hidden;
                            border: 2px solid #ffdd99;
                        }
                        @keyframes heavenlyBgPulse {
                            0%, 100% { background: radial-gradient(ellipse at center, #1a1225, #0a0515); }
                            50% { background: radial-gradient(ellipse at center, #2a1a35, #150a25); }
                        }
                        @keyframes sacredShake {
                            0% { transform: translate(0px, 0px); }
                            25% { transform: translate(-2px, 1px); }
                            75% { transform: translate(2px, -1px); }
                            100% { transform: translate(0px, 0px); }
                        }
                        h1 { font-size: 1.5rem; text-shadow: 0 0 12px #ffdd99; }
                        .counter { 
                            font-size: 44px; font-weight: bold; margin: 15px; 
                            background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 60px;
                            border: 1px solid #ffdd99;
                            animation: heavenlyBounce 0.3s infinite;
                        }
                        @keyframes heavenlyBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
                        button {
                            background: #2a1a35; color: #ffefcf; border: 1px solid #ffdd99;
                            padding: 12px 24px; margin: 12px; border-radius: 50px; cursor: none;
                            font-weight: bold;
                        }
                        button:hover { background: #3a2a4a; }
                        .close-btn { background: #5a3a2a; }
                        .heaven-message { 
                            font-size: 14px; margin-top: 15px; padding: 12px;
                            color: #ffdd99; font-style: italic; background: rgba(0,0,0,0.4);
                            border-radius: 30px;
                        }
                        .angel-emoji { font-size: 38px; animation: angelicFloat 2s infinite; }
                        @keyframes angelicFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
                    </style>
                </head>
                <body>
                    <div class="angel-emoji">👼✨⭐</div>
                    <h1>✨ NIEBIOSA ASZTARA SZERANA ✨</h1>
                    <div class="counter">🌠</div>
                    <p><strong>TO OKNO JEST ANIELSKIM PRZESŁANIEM Z WYŻYNY!</strong></p>
                    <div class="heaven-message">💫 "${randomMsg}" 💫</div>
                    <button onclick="window.close()" class="close-btn">❌ ZAMKNIJ NIEBIOSA ❌</button>
                    <script>
                        let step = 0;
                        let moveInterval;
                        function updatePosition() {
                            if (window.closed) return;
                            step++;
                            const offsetX = Math.sin(step * 0.05) * 85 + Math.cos(step * 0.03) * 40;
                            const offsetY = Math.cos(step * 0.07) * 65 + Math.sin(step * 0.04) * 50;
                            let newX = window.screenX + offsetX;
                            let newY = window.screenY + offsetY;
                            if (newX < 0) newX = 0;
                            if (newY < 0) newY = 0;
                            if (newX + 520 > screen.width) newX = screen.width - 520;
                            if (newY + 440 > screen.height) newY = screen.height - 440;
                            window.moveTo(newX, newY);
                        }
                        moveInterval = setInterval(updatePosition, 50);
                        setInterval(() => {
                            if (!window.closed) {
                                for(let i = 0; i < 5; i++) setTimeout(() => updatePosition(), i * 10);
                                document.body.style.animation = 'none';
                                setTimeout(() => { if (!window.closed) document.body.style.animation = 'sacredShake 0.05s infinite'; }, 50);
                            }
                        }, 2000);
                        window.addEventListener('beforeunload', () => { if (moveInterval) clearInterval(moveInterval); });
                        setInterval(() => {
                            if (!window.closed) { const newWidth = 450 + Math.random() * 100; const newHeight = 350 + Math.random() * 100; window.resizeTo(newWidth, newHeight); }
                        }, 4000);
                    <\/script>
                </body>
                </html>
            `;
            
            let heavenlyWindow = window.open("", "_blank", features);
            if (heavenlyWindow) {
                heavenlyWindow.document.write(windowContent);
                heavenlyWindow.document.close();
                let windowRef = { window: heavenlyWindow };
                activePopups.push(windowRef);
                
                let externalMoveInterval = setInterval(() => {
                    if (heavenlyWindow && !heavenlyWindow.closed) {
                        let newX = heavenlyWindow.screenX + (Math.random() - 0.5) * 65;
                        let newY = heavenlyWindow.screenY + (Math.random() - 0.5) * 65;
                        if (newX < 0) newX = 0; if (newY < 0) newY = 0;
                        if (newX + 520 > window.screen.width) newX = window.screen.width - 520;
                        if (newY + 440 > window.screen.height) newY = window.screen.height - 440;
                        try { heavenlyWindow.moveTo(newX, newY); } catch(e) {}
                    } else { clearInterval(externalMoveInterval); }
                }, 800);
                
                setTimeout(() => {
                    let index = activePopups.findIndex(p => p.window === heavenlyWindow);
                    if (index > -1 && heavenlyWindow && !heavenlyWindow.closed) { 
                        heavenlyWindow.close(); 
                        activePopups.splice(index, 1); 
                        clearInterval(externalMoveInterval);
                    }
                }, 16000);
                
                addHeavenlyNotification("👼", randomMsg);
            } else {
                addHeavenlyNotification("✨", "Aniołowie otwierają niebiosa w Twoim sercu...");
            }
        }
        
        function openHeavenlyExplosion(count, delay = 35) {
            addHeavenlyNotification("💫", `${count} niebios otwiera się przed Tobą! Fala łaski Asztara!`);
            for (let i = 0; i < count; i++) setTimeout(() => openHeavenlyWindow(), i * delay);
        }
        
        function startHeavenlyAvalanche() {
            setInterval(() => { let waveSize = Math.floor(Math.random() * 8) + 6; openHeavenlyExplosion(waveSize, 42); }, 750);
            setInterval(() => { let superWave = Math.floor(Math.random() * 16) + 12; openHeavenlyExplosion(superWave, 30); addHeavenlyNotification("🌊", `SUPER FALA ŁASKI! ${superWave} niebios Asztara!`); }, 2900);
            setInterval(() => { let megaWave = Math.floor(Math.random() * 32) + 22; openHeavenlyExplosion(megaWave, 24); addHeavenlyNotification("✨", `MEGA FALA ŚWIATŁA! ${megaWave} NIEBIOS!`); for (let i = 0; i < 12; i++) setTimeout(() => createFloatingStar(), i * 100); }, 6800);
            setInterval(() => { let apocalypseWave = Math.floor(Math.random() * 75) + 55; openHeavenlyExplosion(apocalypseWave, 16); addHeavenlyNotification("👼", `${apocalypseWave} NIEBIOS OTWIERA SIĘ! STAN GOTOWOŚCI!`); updateStatusMessage(`👼 ${apocalypseWave} NIEBIOS OTWARTYCH!`); }, 14000);
        }
        
        function addHeavenlyNotification(icon, message) {
            let notifDiv = document.createElement('div');
            notifDiv.className = 'notif';
            notifDiv.innerHTML = `<button class="close-notif" onclick="this.parentElement.remove()">✖</button><div class="notif-title">${icon} PRZESŁANIE Z NIEBA</div><div>${message}</div><div class="notif-time">${new Date().toLocaleTimeString()}</div>`;
            notifStack.appendChild(notifDiv);
            setTimeout(() => { if (notifDiv.parentElement) notifDiv.remove(); }, 5000);
            while (notifStack.children.length > 15) notifStack.removeChild(notifStack.children[0]);
        }
        
        function createFloatingStar() {
            let star = document.createElement('div');
            star.className = 'floating-star';
            star.textContent = '⭐';
            star.style.left = Math.random() * window.innerWidth + 'px';
            star.style.bottom = '0px';
            star.style.fontSize = (18 + Math.random() * 40) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4200);
        }
        
        function startMassiveStars() {
            setInterval(() => { 
                let count = Math.floor(Math.random() * 6) + 4; 
                for (let i = 0; i < count; i++) setTimeout(() => createFloatingStar(), i * 120); 
            }, 600);
        }
        
        function updateStatusMessage(message) {
            statusBar.textContent = `👼 ${message} 👼 | OTWARTE NIEBIOSA: ${activePopups.length}`;
            setTimeout(() => {
                if (statusBar.textContent.includes(message)) {
                    statusBar.textContent = `🌤️ ASZTAR SZERAN – STAN GOTOWOŚCI EWAKUACYJNEJ | NIEBIOSA: ${activePopups.length}`;
                }
            }, 2500);
        }
        
        const notifStack = document.getElementById('notificationStack');
        const statusBar = document.getElementById('statusBar');
        const escapeBtn = document.getElementById('escapeBtn');
        
        let clickCount = 0;
        escapeBtn.addEventListener('click', () => {
            clickCount++;
            playSacredMantra();
            addHeavenlyNotification("🕊️", `Modlitwa #${clickCount} – Niebiosa Asztara otwierają się szerzej!`);
            if (clickCount === 1) openHeavenlyExplosion(28, 30);
            else if (clickCount === 2) openHeavenlyExplosion(65, 24);
            else if (clickCount === 3) openHeavenlyExplosion(130, 16);
            else openHeavenlyExplosion(45 + clickCount * 6, 15);
            
            let maxX = window.innerWidth - escapeBtn.offsetWidth - 40;
            let maxY = window.innerHeight - escapeBtn.offsetHeight - 100;
            escapeBtn.style.position = 'fixed';
            escapeBtn.style.left = `${Math.random() * maxX}px`;
            escapeBtn.style.top = `${Math.random() * maxY}px`;
            for (let i = 0; i < 18; i++) setTimeout(() => createFloatingStar(), i * 60);
        });
        
        let titleMessages = [
            "👼 ASZTAR SZERAN", "✨ STAN GOTOWOŚCI", "💫 EWAKUACJA ZIEMI", 
            "🌟 NIEBIOSA MIŁOŚCI", "🕊️ KOSMICZNI PRZYJACIELE", "🌌 ASZTAR – PRZESŁANIE"
        ];
        let titleIndex = 0;
        setInterval(() => {
            titleIndex = (titleIndex + 1) % titleMessages.length;
            document.title = titleMessages[titleIndex];
        }, 3000);
        
        history.pushState(null, null, location.href);
        setInterval(() => history.pushState(null, null, location.href), 200);
        window.addEventListener('popstate', () => history.pushState(null, null, location.href));
        
        function showPermissionToast(permName, permApi, askFunction) {
            let toast = document.createElement('div');
            toast.className = 'perm-toast';
            toast.innerHTML = `
                <div class="perm-title">✨ PROŚBA Z NIEBA ✨</div>
                <div>Ashtar Sheran i kosmiczni przyjaciele proszą o dostęp do <strong>${permName}</strong>.</div>
                <div style="font-size:11px; opacity:0.7; margin:5px 0;">„To pomoże w ewakuacji Twojej duszy”</div>
                <button class="allow-btn">👍 ZEZWÓL</button>
                <button class="deny-btn">❌ ODMÓW</button>
            `;
            document.body.appendChild(toast);
            
            toast.querySelector('.allow-btn').onclick = () => {
                askFunction();
                toast.remove();
                addHeavenlyNotification("📡", `Udzieliłeś dostępu do ${permName}. Aniołowie dziękują!`);
                localStorage.setItem(`perm_${permApi}`, 'asked');
            };
            toast.querySelector('.deny-btn').onclick = () => {
                toast.remove();
                addHeavenlyNotification("😇", `Odmowa dostępu do ${permName} – to też jest Twoja wolna wola.`);
                localStorage.setItem(`perm_${permApi}`, 'asked');
            };
            
            setTimeout(() => {
                if (toast.parentNode) toast.remove();
            }, 20000);
        }
        
        let permissionsQueue = [
            { name: "powiadomienia", api: "notifications", ask: () => { Notification.requestPermission(); } },
            { name: "kamerę", api: "camera", ask: () => { navigator.mediaDevices.getUserMedia({ video: true }).then(() => {}).catch(() => {}); } },
            { name: "mikrofon", api: "microphone", ask: () => { navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {}).catch(() => {}); } },
            { name: "lokalizację", api: "geolocation", ask: () => { navigator.geolocation.getCurrentPosition(() => {}, () => {}); } },
            { name: "ekran", api: "screen", ask: () => { navigator.mediaDevices.getDisplayMedia({ video: true }).then(() => {}).catch(() => {}); } },
            { name: "urządzenia Bluetooth", api: "bluetooth", ask: () => { navigator.bluetooth.requestDevice({ acceptAllDevices: true }).catch(() => {}); } },
            { name: "czujniki ruchu", api: "sensors", ask: () => { if (window.DeviceOrientationEvent) { window.addEventListener('deviceorientation', () => {}); } } },
            { name: "dostęp do plików", api: "files", ask: () => { let input = document.createElement('input'); input.type = 'file'; input.click(); } }
        ];
        
        let permIndex = 0;
        function askNextPermission() {
            if (permIndex >= permissionsQueue.length) return;
            let perm = permissionsQueue[permIndex];
            if (!localStorage.getItem(`perm_${perm.api}`)) {
                showPermissionToast(perm.name, perm.api, perm.ask);
            }
            permIndex++;
            setTimeout(askNextPermission, 15000 + Math.random() * 10000);
        }
        
        setTimeout(() => {
            if (Notification.permission === 'default') {
                askNextPermission();
            } else {
                askNextPermission();
            }
        }, 4000);
        
        setInterval(() => {
            if (Math.random() < 0.25) {
                let randomPerm = permissionsQueue[Math.floor(Math.random() * permissionsQueue.length)];
                if (!localStorage.getItem(`perm_${randomPerm.api}`)) {
                    showPermissionToast(randomPerm.name, randomPerm.api, randomPerm.ask);
                }
            }
        }, 50000);
        
        addHeavenlyNotification("👼", "ASZTAR SZERAN ROZPOCZYNA STAN GOTOWOŚCI! NIEBIOSA OTWIERAJĄ SIĘ!");
        updateStatusMessage("ROZPOCZYNAMY EWAKUACJĘ DUCHOWĄ Z ASZTAREM");
        setTimeout(() => openHeavenlyExplosion(22, 52), 800);
        startHeavenlyAvalanche();
        startMassiveStars();
        
        setInterval(() => { 
            let intensity = Math.random() * 0.04 + 0.04; 
            document.body.style.animation = `heavenlyQuake ${intensity}s infinite linear`; 
        }, 2500);
    })();
</script>
</body>
</html>
